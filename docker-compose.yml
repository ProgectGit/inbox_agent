name: inbox-agent

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16
    container_name: inbox-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: n8n_agent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: n8n_agent
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n_agent -d n8n_agent"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    logging: *default-logging
    networks:
      - inbox_agent_internal

  n8n:
    image: n8nio/n8n:latest
    container_name: inbox-agent-n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n_agent
      DB_POSTGRESDB_USER: n8n_agent
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_HOST: inbox.mihabot.top
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      N8N_PROXY_HOPS: 1
      N8N_SECURE_COOKIE: "true"
      N8N_EDITOR_BASE_URL: https://inbox.mihabot.top/
      WEBHOOK_URL: https://inbox.mihabot.top/
      GENERIC_TIMEZONE: Europe/Kiev
      TZ: Europe/Kiev
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: ${EXECUTIONS_DATA_MAX_AGE:-168}
      EXECUTIONS_DATA_PRUNE_MAX_COUNT: ${EXECUTIONS_DATA_PRUNE_MAX_COUNT:-2000}
      EXECUTIONS_DATA_SAVE_ON_ERROR: all
      EXECUTIONS_DATA_SAVE_ON_PROGRESS: "false"
      N8N_CONCURRENCY_PRODUCTION_LIMIT: ${N8N_CONCURRENCY_PRODUCTION_LIMIT:-2}
      NODE_FUNCTION_ALLOW_EXTERNAL: mammoth
      NODE_PATH: /usr/local/lib/node_modules/n8n/node_modules
    ports:
      - "127.0.0.1:5679:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    logging: *default-logging
    networks:
      - inbox_agent_internal

  postgres-backup:
    image: inbox-agent-backup:latest
    build:
      context: ./services/postgres-backup
    container_name: inbox-agent-postgres-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: .backup.env
        required: false
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: n8n_agent
      PGUSER: n8n_agent
      PGPASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      BACKUP_PREFIX: ${BACKUP_PREFIX:-backups/postgresql}
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/last-backup-success"]
      interval: 5m
      timeout: 5s
      retries: 3
      start_period: 10m
    logging: *default-logging
    networks:
      - inbox_agent_internal

  config-backup:
    image: inbox-agent-backup:latest
    container_name: inbox-agent-config-backup
    restart: unless-stopped
    depends_on:
      postgres-backup:
        condition: service_healthy
    env_file:
      - path: .backup.env
        required: false
    environment:
      RECOVERY_AGE_RECIPIENT: ${RECOVERY_AGE_RECIPIENT:-}
      CONFIG_BACKUP_INTERVAL_SECONDS: ${CONFIG_BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      CONFIG_BACKUP_PREFIX: ${CONFIG_BACKUP_PREFIX:-backups/config}
    entrypoint: ["/usr/local/bin/inbox-config-backup"]
    volumes:
      - ./.env:/recovery/inbox-agent/.env:ro
      - ./.backup.env:/recovery/inbox-agent/.backup.env:ro
      - ./docker-compose.yml:/recovery/inbox-agent/docker-compose.yml:ro
      - /etc/nginx/conf.d/inbox.mihabot.top.conf:/recovery/nginx/inbox.mihabot.top.conf:ro
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/last-config-backup-success"]
      interval: 5m
      timeout: 5s
      retries: 3
      start_period: 10m
    logging: *default-logging
    networks:
      - inbox_agent_internal

  youtube-reader:
    build:
      context: ./services/youtube-reader
    container_name: inbox-agent-youtube-reader
    restart: unless-stopped
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging
    networks:
      - inbox_agent_internal

  qdrant:
    image: qdrant/qdrant:latest
    container_name: inbox-agent-qdrant
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    expose:
      - "6333"
      - "6334"
    volumes:
      - qdrant_data:/qdrant/storage
    logging: *default-logging
    networks:
      - inbox_agent_internal

  disk-monitor:
    build:
      context: ./services/disk-monitor
    container_name: inbox-agent-disk-monitor
    restart: unless-stopped
    environment:
      DISK_ALERT_PERCENT: ${DISK_ALERT_PERCENT:-80}
      DISK_CHECK_INTERVAL_SECONDS: ${DISK_CHECK_INTERVAL_SECONDS:-300}
    volumes:
      - /:/host:ro
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/last-disk-check"]
      interval: 5m
      timeout: 5s
      retries: 3
      start_period: 1m
    network_mode: none
    logging: *default-logging

volumes:
  postgres_data:
  n8n_data:
  qdrant_data:

networks:
  inbox_agent_internal:
    driver: bridge
